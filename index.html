<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Smart odpady - provozní systém pro odpady, vozidla a trasy."
    />
    <title>Smart odpady</title>
    <script>
      const pathParts = location.pathname.split("/").filter(Boolean);
      const basePath = location.hostname.endsWith("github.io") && pathParts.length > 0
        ? `/${pathParts[0]}/`
        : "/";
      document.write(`<base href="${basePath}">`);
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
