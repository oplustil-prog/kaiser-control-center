name: partslink24 VIN pilot

on:
  workflow_dispatch:
    inputs:
      vin:
        description: "VIN pro jeden read-only pilot. Nepoužívej citlivý ostrý VIN bez schválení."
        required: true
        type: string
      vehicle_id:
        description: "Volitelné ID vozidla v KSO pro auditní vazbu."
        required: false
        type: string
      request_id:
        description: "Volitelné ID hlášení řidiče v KSO pro auditní vazbu."
        required: false
        type: string
      dry_run:
        description: "Jen ověřit konfiguraci, bez přihlášení do partslink24."
        required: true
        type: boolean
        default: true
      allow_live_login:
        description: "Povolit skutečné přihlášení do partslink24. Jen po ručním potvrzení."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: partslink24-vin-pilot
  cancel-in-progress: false

jobs:
  pilot:
    name: Read-only VIN search pilot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mask inputs and secrets
        env:
          VIN: ${{ inputs.vin }}
          PARTSLINK24_COMPANY_ID: ${{ secrets.PARTSLINK24_COMPANY_ID }}
          PARTSLINK24_USERNAME: ${{ secrets.PARTSLINK24_USERNAME }}
          PARTSLINK24_PASSWORD: ${{ secrets.PARTSLINK24_PASSWORD }}
        run: |
          echo "::add-mask::$VIN"
          echo "::add-mask::$PARTSLINK24_COMPANY_ID"
          echo "::add-mask::$PARTSLINK24_USERNAME"
          echo "::add-mask::$PARTSLINK24_PASSWORD"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright for confirmed live pilot
        if: ${{ inputs.dry_run == false && inputs.allow_live_login == true }}
        run: |
          npm install --no-save playwright@1.53.0
          npx playwright install chromium

      - name: Run partslink24 VIN pilot
        env:
          PARTSLINK24_COMPANY_ID: ${{ secrets.PARTSLINK24_COMPANY_ID }}
          PARTSLINK24_USERNAME: ${{ secrets.PARTSLINK24_USERNAME }}
          PARTSLINK24_PASSWORD: ${{ secrets.PARTSLINK24_PASSWORD }}
          PARTSLINK24_TEST_VIN: ${{ inputs.vin }}
          PARTSLINK24_TEST_VEHICLE_ID: ${{ inputs.vehicle_id }}
          PARTSLINK24_TEST_REQUEST_ID: ${{ inputs.request_id }}
          PARTSLINK24_PILOT_DRY_RUN: ${{ inputs.dry_run }}
          PARTSLINK24_ALLOW_LIVE_LOGIN: ${{ inputs.allow_live_login }}
        run: node scripts/partslink24_vin_pilot.mjs
